<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GPS → Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:#0a0b0d; font-family:'Space Mono', monospace; color:#e8e9ea; }

body {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
}

.card {
  width:100%; max-width:360px;
  background:#111214;
  border:1px solid rgba(255,255,255,.07);
  border-radius:24px;
  padding:32px 24px;
  display:flex; flex-direction:column; align-items:center; gap:28px;
}

.logo {
  font-size:11px; font-weight:700; letter-spacing:3px; color:#3B6CFF;
  text-transform:uppercase;
}

.status-ring {
  position:relative; width:120px; height:120px;
  display:flex; align-items:center; justify-content:center;
}
.ring {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid rgba(59,108,255,.15);
}
.ring-pulse {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid #3B6CFF;
  opacity:0; animation:none;
}
.ring-pulse.active { animation: ripple 2s ease-out infinite; }
@keyframes ripple {
  0% { transform:scale(1); opacity:.6; }
  100% { transform:scale(1.5); opacity:0; }
}
.center-dot {
  width:48px; height:48px; border-radius:50%;
  background:#1a1c1f;
  border:2px solid rgba(255,255,255,.1);
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  transition: background .3s, border-color .3s;
  position:relative; z-index:1;
}
.center-dot.sending { background:#0d1a2e; border-color:#3B6CFF; }
.center-dot.error   { background:#1f0d0d; border-color:#FF6B5B; }

.status-text {
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color:#8A8F99; text-align:center; line-height:1.6;
}
.status-text span { display:block; }
.status-text .main { font-size:13px; color:#e8e9ea; font-weight:700; margin-bottom:4px; }

.coords-box {
  width:100%; background:#0a0b0d;
  border:1px solid rgba(255,255,255,.05);
  border-radius:14px; padding:14px 18px;
  display:flex; flex-direction:column; gap:6px;
}
.coord-row { display:flex; justify-content:space-between; align-items:center; }
.coord-label { font-size:9px; letter-spacing:2px; color:#8A8F99; text-transform:uppercase; }
.coord-val { font-size:12px; color:#3B6CFF; font-weight:700; }

.btn {
  width:100%; padding:16px;
  border-radius:14px; border:none; cursor:pointer;
  font-family:'Space Mono', monospace;
  font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  transition: all .2s;
}
.btn-start {
  background:#3B6CFF; color:#fff;
  box-shadow: 0 0 24px rgba(59,108,255,.3);
}
.btn-start:hover { background:#5585ff; }
.btn-start:active { transform:scale(.98); }
.btn-stop {
  background:transparent; color:#FF6B5B;
  border:1px solid rgba(255,107,91,.3);
}
.btn-stop:hover { background:rgba(255,107,91,.08); }

.updates-log {
  width:100%;
  font-size:10px; color:#8A8F99; letter-spacing:.5px;
  text-align:center; line-height:1.8;
  min-height:20px;
}
.updates-log .ok { color:#2ECC71; }
.updates-log .err { color:#FF6B5B; }

.footer {
  font-size:9px; color:rgba(138,143,153,.5); letter-spacing:1px;
  text-align:center; text-transform:uppercase;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">⬡ Stream GPS</div>

  <div class="status-ring">
    <div class="ring"></div>
    <div class="ring-pulse" id="ringPulse"></div>
    <div class="center-dot" id="centerDot">📡</div>
  </div>

  <div class="status-text">
    <span class="main" id="statusMain">Pronto</span>
    <span id="statusSub">Carrega em Iniciar para começar</span>
  </div>

  <div class="coords-box">
    <div class="coord-row">
      <span class="coord-label">Latitude</span>
      <span class="coord-val" id="latVal">--</span>
    </div>
    <div class="coord-row">
      <span class="coord-label">Longitude</span>
      <span class="coord-val" id="lngVal">--</span>
    </div>
    <div class="coord-row">
      <span class="coord-label">Precisão</span>
      <span class="coord-val" id="accVal">--</span>
    </div>
  </div>

  <button class="btn btn-start" id="mainBtn" onclick="toggleTracking()">▶ Iniciar</button>

  <div class="updates-log" id="logMsg">Aguardando...</div>

  <div class="footer">Envia GPS → Firebase → Widget</div>
</div>

<script>
// ══════════════════════════════════════════
// 🔧 MUDA AQUI para o teu Firebase URL
const FB_URL = 'https://stream-overlay-95750-default-rtdb.firebaseio.com/location.json';
// ══════════════════════════════════════════

let watchId = null;
let isTracking = false;
let sendCount = 0;

function toggleTracking() {
  if (!isTracking) startTracking();
  else stopTracking();
}

function startTracking() {
  if (!navigator.geolocation) {
    setStatus('error', 'GPS não suportado', 'Usa um browser moderno');
    return;
  }

  setStatus('waiting', 'A obter GPS...', 'Aceita a permissão de localização');
  document.getElementById('mainBtn').textContent = '⏹ Parar';
  document.getElementById('mainBtn').className = 'btn btn-stop';
  isTracking = true;

  watchId = navigator.geolocation.watchPosition(
    onPosition,
    onError,
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

function stopTracking() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  isTracking = false;
  setStatus('idle', 'Parado', 'Carrega em Iniciar para recomeçar');
  document.getElementById('mainBtn').textContent = '▶ Iniciar';
  document.getElementById('mainBtn').className = 'btn btn-start';
  document.getElementById('ringPulse').classList.remove('active');
  document.getElementById('centerDot').className = 'center-dot';
  document.getElementById('centerDot').textContent = '📡';
}

async function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;

  document.getElementById('latVal').textContent = lat.toFixed(6);
  document.getElementById('lngVal').textContent = lng.toFixed(6);
  document.getElementById('accVal').textContent = Math.round(accuracy) + 'm';

  setStatus('sending', 'A enviar...', 'Localização activa');
  document.getElementById('ringPulse').classList.add('active');
  document.getElementById('centerDot').className = 'center-dot sending';
  document.getElementById('centerDot').textContent = '🛰️';

  try {
    const payload = { lat, lng, accuracy, ts: Date.now() };
    const res = await fetch(FB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    sendCount++;
    setLog(`<span class="ok">✓ Enviado #${sendCount} — ${new Date().toLocaleTimeString('pt')}</span>`);
  } catch(e) {
    setLog(`<span class="err">✗ Erro ao enviar: ${e.message}</span>`);
    document.getElementById('centerDot').className = 'center-dot error';
    document.getElementById('centerDot').textContent = '⚠️';
  }
}

function onError(err) {
  const msgs = {
    1: 'Permissão negada. Activa o GPS nas definições.',
    2: 'GPS indisponível.',
    3: 'Timeout a obter localização.'
  };
  setStatus('error', 'Erro GPS', msgs[err.code] || 'Erro desconhecido');
  document.getElementById('centerDot').className = 'center-dot error';
  document.getElementById('centerDot').textContent = '⚠️';
}

function setStatus(type, main, sub) {
  document.getElementById('statusMain').textContent = main;
  document.getElementById('statusSub').textContent = sub;
}

function setLog(html) {
  document.getElementById('logMsg').innerHTML = html;
}
</script>
</body>
</html>
