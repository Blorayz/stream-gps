<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream GPS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111214; font-family:-apple-system,sans-serif; color:#E8E9EA; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px; }
.logo { font-size:12px; font-weight:700; letter-spacing:3px; color:#8A8F99; text-transform:uppercase; }
.card { width:100%; max-width:340px; background:#1A1C1F; border-radius:20px; padding:22px; display:flex; flex-direction:column; gap:14px; }
.row { display:flex; align-items:center; gap:10px; }
.dot { width:10px; height:10px; border-radius:50%; background:#8A8F99; }
.dot.on { background:#2ECC71; }
.dot.err { background:#FF6B5B; }
.lbl { font-size:12px; font-weight:600; color:#8A8F99; text-transform:uppercase; }
.val { font-size:14px; font-weight:600; color:#E8E9EA; margin-left:auto; }
.counter { font-size:26px; font-weight:800; color:#3B6CFF; }
.counter span { font-size:12px; color:#8A8F99; margin-left:3px; }
.coords { font-size:11px; color:#8A8F99; text-align:center; }
.btn { width:100%; max-width:340px; padding:18px; border-radius:14px; border:none; font-size:16px; font-weight:700; cursor:pointer; }
.btn-start { background:#2ECC71; color:#111214; }
.btn-stop { background:#FF6B5B; color:#fff; display:none; }
</style>
</head>
<body>
<div class="logo">Stream GPS Sender</div>
<div class="card">
  <div class="row"><div class="dot" id="dGps"></div><span class="lbl">GPS</span><span class="val" id="vGps">Inativo</span></div>
  <div class="row"><div class="dot" id="dFb"></div><span class="lbl">Firebase</span><span class="val" id="vFb">Aguarda</span></div>
  <div class="row"><div class="dot" id="dSend"></div><span class="lbl">Envios</span><div class="counter" id="cnt">0<span>envios</span></div></div>
  <div class="coords" id="coords">--</div>
</div>
<button class="btn btn-start" id="btnStart" onclick="start()">▶ Iniciar Tracking</button>
<button class="btn btn-stop" id="btnStop" onclick="stop()">■ Parar</button>
<script>
const FB="https://stream-overlay-95750-default-rtdb.firebaseio.com/location.json";
let wid=null,cnt=0,last=0;
function dot(id,cls){document.getElementById(id).className="dot"+(cls?" "+cls:"");}
function start(){
  if(!navigator.geolocation){alert("GPS nao disponivel");return;}
  document.getElementById("btnStart").style.display="none";
  document.getElementById("btnStop").style.display="block";
  dot("dGps","on");
  wid=navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}
function stop(){
  if(wid!==null)navigator.geolocation.clearWatch(wid);
  wid=null;
  document.getElementById("btnStart").style.display="block";
  document.getElementById("btnStop").style.display="none";
}
async function onPos(p){
  const now=Date.now();
  if(now-last<5000)return;
  last=now;
  const lat=p.coords.latitude,lng=p.coords.longitude,acc=p.coords.accuracy;
  document.getElementById("vGps").textContent="+-"+Math.round(acc)+"m";
  document.getElementById("coords").textContent=lat.toFixed(5)+", "+lng.toFixed(5);
  try{
    const r=await fetch(FB,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({lat,lng,ts:now})});
    if(r.ok){cnt++;document.getElementById("cnt").innerHTML=cnt+"<span>envios</span>";document.getElementById("vFb").textContent="OK";dot("dFb","on");dot("dSend","on");}
    else{document.getElementById("vFb").textContent="Erro "+r.status;dot("dFb","err");}
  }catch(e){document.getElementById("vFb").textContent="Sem rede";dot("dFb","err");}
}
function onErr(){document.getElementById("vGps").textContent="Erro GPS";dot("dGps","err");}
</script>
</body>
</html>
