<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker GPS - Tesla Nav</title>
<style>
body { font-family: system-ui; background: #111; color: #fff; padding: 20px; text-align: center; }
.status { padding: 20px; border-radius: 12px; margin: 20px 0; }
.online { background: #2ECC71; }
.offline { background: #FF6B5B; }
button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; background: #3B6CFF; color: white; cursor: pointer; }
</style>
</head>
<body>
<h2>🚗 Tesla GPS Tracker</h2>
<div id="status" class="status offline">Aguardando GPS...</div>
<button onclick="startTracking()">Iniciar Partilha</button>
<p style="color:#888; font-size:12px;">Mantém esta página aberta</p>

<script>
const FB_URL = 'https://stream-overlay-95750-default-rtdb.firebaseio.com/location.json';
let watchId;

function startTracking() {
  if (!navigator.geolocation) {
    alert('GPS não suportado neste dispositivo');
    return;
  }
  
  document.getElementById('status').textContent = 'A procurar sinal GPS...';
  
  watchId = navigator.geolocation.watchPosition(
    async (pos) => {
      const data = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        ts: Date.now()
      };
      
      // Envia para Firebase
      await fetch(FB_URL, {
        method: 'PUT',
        body: JSON.stringify(data)
      });
      
      document.getElementById('status').className = 'status online';
      document.getElementById('status').textContent = 
        `✅ Online | ${data.lat.toFixed(4)}, ${data.lng.toFixed(4)}`;
    },
    (err) => {
      document.getElementById('status').className = 'status offline';
      document.getElementById('status').textContent = '❌ Erro: ' + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
}

// Para quando fechas a página
window.onbeforeunload = () => {
  if (watchId) navigator.geolocation.clearWatch(watchId);
};
</script>
</body>
</html>
