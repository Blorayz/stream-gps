<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Nav Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; font-family:'Inter',sans-serif; }
#nav-widget { width:400px; background:#111214; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.7); }
#map { width:100%; height:230px; position:relative; background:#1a1c1f; z-index:1; }
.leaflet-container { background:#111214 !important; }
.leaflet-control-zoom, .leaflet-control-attribution { display:none !important; }
#map::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px); pointer-events:none; z-index:500; }
#map-fade { position:absolute; bottom:0; left:0; right:0; height:70px; background:linear-gradient(transparent,#111214); z-index:501; pointer-events:none; }
#city-name { position:absolute; bottom:76px; left:50%; transform:translateX(-50%); font-size:10px; font-weight:700; color:rgba(232,233,234,.75); text-transform:uppercase; letter-spacing:2.5px; z-index:502; white-space:nowrap; text-shadow:0 1px 6px rgba(0,0,0,.9); pointer-events:none; }
#gps-dot { position:absolute; top:12px; right:12px; width:9px; height:9px; border-radius:50%; background:#FF6B5B; box-shadow:0 0 8px rgba(255,107,91,.7); z-index:502; }
#gps-dot.online { background:#2ECC71; box-shadow:0 0 8px rgba(46,204,113,.7); animation:gps-pulse 2s ease-in-out infinite; }
@keyframes gps-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }
.car-marker { width:20px; height:20px; background:#3B6CFF; border-radius:50%; border:3px solid #E8E9EA; box-shadow:0 0 12px rgba(59,108,255,.8); }
#bottom-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px 18px; background:#111214; gap:8px; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
.nav-label { font-size:9px; font-weight:700; color:#8A8F99; text-transform:uppercase; letter-spacing:1.2px; line-height:1; }
.nav-value { font-size:28px; font-weight:800; color:#E8E9EA; letter-spacing:-1px; line-height:1; }
.nav-value.temp { color:#3B6CFF; }
.nav-value.time { font-size:34px; }
.nav-value.zone { color:#F0AD4E; font-size:15px; letter-spacing:0; text-align:center; }
.nav-unit { font-size:11px; font-weight:500; color:#8A8F99; }
.nav-divider { width:1px; height:40px; background:rgba(255,255,255,.07); flex-shrink:0; }
</style>
</head>
<body>
<div id="nav-widget">
  <div id="map">
    <div id="map-fade"></div>
    <div id="city-name">A localizar...</div>
    <div id="gps-dot"></div>
  </div>
  <div id="bottom-bar">
    <div class="nav-item">
      <span class="nav-label">Temp</span>
      <span class="nav-value temp" id="tempVal">--</span>
      <span class="nav-unit">°C</span>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item">
      <span class="nav-value time" id="timeVal">--:--</span>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item">
      <span class="nav-label">Zona</span>
      <span class="nav-value zone" id="zoneVal">--</span>
    </div>
  </div>
</div>
<script>
// ============================================
// CONFIGURAÇÕES - ALTERA AQUI COM OS TEUS DADOS
// ============================================
const PULL_KEY   = '7o28sn2176qv2ij5';  // <-- SUBSTITUI COM O TEU PULL KEY DO REALTIMEIRL
const MAPBOX_KEY = 'pk.eyJ1Ijoia2V2bW8zMTQiLCJhIjoiY2w0MW1qaTh3MG80dzNjcXRndmJ0a2JieiJ9.Y_xABmAqvD-qZeed8MabxQ';  // <-- SUBSTITUI COM A TUA API KEY DO MAPBOX

// Inicializa mapa
const map = L.map('map', { 
  zoomControl: false, 
  attributionControl: false, 
  dragging: false, 
  scrollWheelZoom: false, 
  doubleClickZoom: false, 
  keyboard: false, 
  touchZoom: false 
});

L.tileLayer(
  'https://api.mapbox.com/styles/v1/mapbox/dark-v11/tiles/{z}/{x}/{y}?access_token=' + MAPBOX_KEY,
  { maxZoom: 19, tileSize: 512, zoomOffset: -1 }
).addTo(map);

// Posição inicial (Lisboa) até receber dados do telemóvel
map.setView([38.7169, -9.1395], 17);

// Marcador do carro
const markerIcon = L.divIcon({ 
  className: '', 
  html: '<div class="car-marker"></div>', 
  iconSize: [20, 20], 
  iconAnchor: [10, 10] 
});
const marker = L.marker([38.7169, -9.1395], { icon: markerIcon }).addTo(map);

// Controlo de rate limiting
let lastCity = 0;
let lastWeather = 0;
let isFirstLocation = true;

// Relógio
function updateClock() {
  const n = new Date();
  document.getElementById('timeVal').textContent =
    String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
}
setInterval(updateClock, 1000);
updateClock();

// Buscar localização do RealtimeIRL
async function fetchLocation() {
  try {
    const res = await fetch('https://api.rtirl.com/location?key=' + PULL_KEY + '&t=' + Date.now());
    
    if (!res.ok) throw new Error('API error: ' + res.status);
    const d = await res.json();
    
    if (!d || d.latitude == null || d.longitude == null) { 
      setOffline(); 
      return; 
    }
    
    setOnline();
    const ll = [d.latitude, d.longitude];
    
    // Atualiza marcador
    marker.setLatLng(ll);
    
    // No primeiro update, centra o mapa. Depois, apenas pan suave
    if (isFirstLocation) {
      map.setView(ll, 17, { animate: true, duration: 1 });
      isFirstLocation = false;
    } else {
      map.panTo(ll, { animate: true, duration: 0.8 });
    }
    
    // Busca cidade e temperatura (com rate limiting)
    fetchCity(d.latitude, d.longitude);
    fetchWeather(d.latitude, d.longitude);
    
  } catch(e) { 
    console.error('Erro ao buscar localização:', e);
    setOffline(); 
  }
}

function setOnline() { 
  document.getElementById('gps-dot').className = 'online'; 
}

function setOffline() { 
  document.getElementById('gps-dot').className = ''; 
}

// Buscar nome da cidade/rua (máx 1x por 30 segundos)
async function fetchCity(lat, lng) {
  if (Date.now() - lastCity < 30000) return;
  lastCity = Date.now();
  
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
    const d = await res.json();
    
    const address = d.address || {};
    const road = address.road || '';
    const suburb = address.suburb || address.neighbourhood || '';
    const city = address.city || address.town || address.village || '';
    
    // Mostra rua, suburbio ou cidade
    const displayLocation = road || suburb || city || 'Em rota...';
    document.getElementById('city-name').textContent = displayLocation;
    
    // Zona (para o widget pequeno)
    const zone = suburb || city || '--';
    document.getElementById('zoneVal').textContent = zone.length > 12 ? zone.substring(0, 12) + '…' : zone;
    
  } catch(e) {
    console.error('Erro ao buscar cidade:', e);
  }
}

// Buscar temperatura (máx 1x por 5 minutos)
async function fetchWeather(lat, lng) {
  if (Date.now() - lastWeather < 300000) return;
  lastWeather = Date.now();
  
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m&timezone=auto`);
    const d = await res.json();
    
    const temp = d.current?.temperature_2m;
    document.getElementById('tempVal').textContent = temp !== undefined ? Math.round(temp) : '--';
    
  } catch(e) {
    console.error('Erro ao buscar temperatura:', e);
  }
}

// Inicia e atualiza a cada 5 segundos
fetchLocation();
setInterval(fetchLocation, 5000);
</script>
</body>
</html>
